name: Merge Thank You

on:
  pull_request_target:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  post_merge_message:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post thank you message
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const contributor = pr.user.login;
            
            const commentBody = `### 🎉 Contribution Merged!
            
            Thank you so much, @${contributor}, for your contribution! Your pull request #${prNumber} has been successfully merged. 
            
            We truly appreciate your time and effort in making this Algo project better for the community. Keep up the amazing work! 🚀✨`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
