name: CI/CD Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Code Quality & Verification
  verify:
    name: Code Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm' # Change to yarn/pnpm if needed

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint
        # Assumes 'lint': 'eslint .' or similar in package.json

      - name: Type Check
        run: npm run type-check
        # Assumes 'type-check': 'tsc --noEmit' for TypeScript

  # 2. Documentation & Content Validation
  docs-validation:
    name: Docs & Markdown Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Markdown Lint Validation
        uses: davidanson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3. Performance & Accessibility Audit
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Audit Live/Preview URL
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Replace with your actual preview or staging URL
          urls: |
            https://ajay-dhangar.github.io/algo/
          budgetPath: ./lighthouse-budget.json # Optional performance budget
          uploadArtifacts: true
          temporaryPublicStorage: true

  # 4. Pull Request Automation (Labeler)
  labeler:
    name: Auto Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - name: Label PR based on file changes
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  # 5. Pull Request Preview Deployment
  deploy-preview:
    name: PR Preview Deploy
    runs-on: ubuntu-latest
    needs: [verify, docs-validation]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Example using Vercel CLI (highly recommended for Algo visualizers/docs)
      # - name: Install Vercel CLI
      #   run: npm install --global vercel@latest

      # - name: Pull Vercel Environment Information
      #   run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # - name: Build Project Artifacts
      #   run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # - name: Deploy Project Artifacts to Vercel
      #   id: deploy
      #   run: |
      #     DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
      #     echo "PREVIEW_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with Preview Link
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ### PR Preview Successfully Deployed!
            * **Preview URL:** [${{ steps.deploy.outputs.PREVIEW_URL }}](${{ steps.deploy.outputs.PREVIEW_URL }})
            * *Built automatically by GitHub Actions.*
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
