name: Issue Auto Comment

on:
  issues:
    types: [opened, closed]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Handle Issue Activity Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const creator = issue.user.login;
            const action = context.payload.action;
            
            let commentBody = "";
            
            if (action === "opened") {
              commentBody = `### 👋 Thanks for opening this issue, @${creator}!
              
              We appreciate you taking the time to help improve our Algo project! 🚀
              
              To help us address this effectively, please make sure you've included:
              * 📝 **Clear description** of the problem or feature request.
              * 💻 **Code snippets** or error steps (especially for algorithmic edge cases).
              * 🖼️ **Screenshots** or visual context if applicable.
              
              Please ensure you adhere to our project's **Guidelines** and **Code of Conduct**. A maintainer will review it shortly. Happy coding! ✨`;
            } else if (action === "closed") {
              commentBody = `### ✅ Issue Resolved & Closed
              
              Thank you, @${creator}, for your support and collaboration in sorting this out! Your involvement keeps this educational platform growing. 🌟
              
              If you have more algorithmic insights, find new bugs, or want to add fresh content, don't hesitate to open a brand-new issue. Happy coding! 🚀`;
            }
            
            if (commentBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: commentBody
              });
            }
