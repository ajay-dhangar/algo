name: Auto Issue Assigner

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign-issue:
    # Ensures the workflow only runs for comments on open issues, not pull requests
    if: ${{ !github.event.issue.pull_request && (contains(github.event.comment.body, '.take') || contains(github.event.comment.body, '!assign')) }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Check if issue is already assigned
        id: check_assignee
        run: |
          ASSIGNEE="${{ github.event.issue.assignee.login }}"
          if [ -n "$ASSIGNEE" ]; then
            echo "already_assigned=true" >> $GITHUB_OUTPUT
            echo "Issue is already assigned to $ASSIGNEE."
          else
            echo "already_assigned=false" >> $GITHUB_OUTPUT
          fi

      - name: Assign the issue to the contributor
        if: steps.check_assignee.outputs.already_assigned == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.comment.user.login]
            });

      - name: Add success confirmation comment
        if: steps.check_assignee.outputs.already_assigned == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `@${context.payload.comment.user.login} has been automatically assigned to this issue. Please submit your PR within the required timeline!`
            });
