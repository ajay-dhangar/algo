name: Automated Markdown Code Verification

on:
  pull_request:
    paths:
      - 'docs/**'
      - '**/*.md'
      - '**/*.mdx'

jobs:
  verify-code:
    name: Verify Documented Algorithms
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: npm install

      - name: Run Code Verification Script
        run: node scripts/verify-markdown-code.js
